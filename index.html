<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Caballero Barbershop Wien</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0d0d0d;
  color: white;
}

/* HERO */
header {
  background: url('https://images.unsplash.com/photo-1599351431202-1e0f0137899a?auto=format&fit=crop&w=1400&q=80') center/cover no-repeat;
  height: 90vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

header h1 {
  font-size: 55px;
}

header p {
  font-size: 20px;
}

.btn {
  margin-top: 20px;
  padding: 15px 35px;
  background: gold;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

/* SECTION */
section {
  padding: 60px 20px;
  max-width: 1000px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 40px;
}

/* BOXEN */
.box {
  background: #1a1a1a;
  padding: 25px;
  border-radius: 10px;
  text-align: center;
  margin-bottom: 20px;
}

/* PREISE */
.prices {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

/* GALERIE */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 15px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
}

/* FOOTER */
footer {
  background: black;
  text-align: center;
  padding: 30px;
}
</style>
</head>

<body>

<header>
  <h1>Caballero Barbershop</h1>
  <p>4,9 ★ (127 Bewertungen)</p>
<a href="https://wa.me/4369010162222?text=Hallo%20ich%20möchte%20einen%20Termin%20buchen" target="_blank">
  <button class="btn">Jetzt Termin auf WhatsApp</button>
</a>
</header>

<section>
  <h2>Unsere Leistungen</h2>
  <div id="leistungen"></div>
</section>

<section>
  <h2>Preise</h2>
  <div class="prices" id="preise"></div>
</section>

<section>
  <h2>Galerie</h2>
  <div class="gallery" id="galerie"></div>
</section>

<section>
  <h2>Öffnungszeiten</h2>
  <div class="box" id="oeffnungszeiten"></div>
</section>

<section>
  <h2>Kontakt</h2>
  <div class="box" id="kontakt"></div>
</section>

<footer>
  © 2026 Caballero Barbershop Wien
</footer>

<script>
// Google Sheet CSV-URL
const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS-1z1U6Y3YHAzl_aOtT3kmtT1JOqUhMhig7G5gtmkrhMiv48IgeMdZf-rDLD9kdi8m31CSMXPHHCuM/pub?output=csv';

fetch(sheetUrl)
  .then(res => res.text())
  .then(csvText => {
    const rows = csvText.split('\n').map(r => {
      return r.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g)?.map(cell => cell.replace(/"/g, '').trim()) || [];
    });

    const leistungenDiv = document.getElementById('leistungen');
    const preiseDiv = document.getElementById('preise');
    const galerieDiv = document.getElementById('galerie');
    const oeffDiv = document.getElementById('oeffnungszeiten');
    const kontaktDiv = document.getElementById('kontakt');

    rows.forEach(row => {
      const section = row[0]?.trim();
      const title = row[1]?.trim();
      const content = row[2]?.trim();

      // Leistungen
      if(section === 'Leistungen' && content) {
        const box = document.createElement('div');
        box.className = 'box';
        box.textContent = content;
        leistungenDiv.appendChild(box);
      }

      // Preise
      if(section === 'Preise' && title && content) {
        const box = document.createElement('div');
        box.className = 'box';
        box.innerHTML = `<h3>${title}</h3><p>${content}</p>`;
        preiseDiv.appendChild(box);
      }

      // Galerie
      if(section === 'Galerie' && content) {
        const img = document.createElement('img');
        img.src = content;
        galerieDiv.appendChild(img);
      }

      // Öffnungszeiten
      if(section === 'Öffnungszeiten' && content) {
        oeffDiv.innerHTML = content.replace(/\\n/g, '<br>');
      }

      // Kontakt
      if(section === 'Kontakt' && content) {
        kontaktDiv.innerHTML = content.replace(/\\n/g, '<br>');
      }
    });
  })
  .catch(err => console.error('Fehler beim Laden des Sheets:', err));
</script>

</body>
</html>
